services:
  - type: web
    name: enrichisseur-dirigeants
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PHAROW_API_KEY
        sync: false
      - key: FULLENRICH_API_KEY
        sync: false

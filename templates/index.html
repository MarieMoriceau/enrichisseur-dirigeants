<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrichisseur Dirigeants</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: white; padding: 24px 32px; }
.header h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.header p { font-size: 13px; opacity: 0.75; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 14px; }
.zone { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 36px; text-align: center; cursor: pointer; color: #64748b; transition: all 0.2s; }
.zone:hover { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
.zone input { display: none; }
.btn { border: none; border-radius: 8px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-stop { background: #ef4444; color: white; display: none; }
.btn-export { background: #059669; color: white; display: none; }
.btn-email { background: linear-gradient(135deg, #059669, #0891b2); color: white; display: none; }
.btn-email:disabled { opacity: 0.4; cursor: not-allowed; }
.progress-bar { height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin-top: 12px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #7c3aed); border-radius: 99px; transition: width 0.3s; width: 0%; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #f8fafc; color: #475569; font-weight: 700; padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
tr:hover td { background: #f8fafc; }
.email-ok { color: #2563eb; font-weight: 600; }
.no-email { color: #94a3b8; font-style: italic; }
.badge { border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700; }
.haute { background: #dcfce7; color: #166534; }
.moyenne { background: #fef9c3; color: #854d0e; }
.faible { background: #fee2e2; color: #991b1b; }
.src-pappers { background: #eff6ff; color: #2563eb; }
.src-claude { background: #f5f3ff; color: #7c3aed; }
.src-fullenrich { background: #dcfce7; color: #166534; }
.info { font-size: 12px; color: #059669; font-weight: 600; margin-top: 8px; }
.row-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
.stat { font-size: 12px; color: #64748b; }
.countdown { font-size: 11px; color: #7c3aed; font-weight: 600; margin-top: 4px; height: 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>🔍 Enrichisseur Dirigeants</h1>
  <p>Pappers + Claude AI + Fullenrich — Dirigeants &amp; Emails</p>
</div>
<div class="container">

  <div class="card">
    <h2>📋 Importer vos sociétés (CSV ou Excel)</h2>
    <div class="zone" id="zone" onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault();this.style.borderColor='#2563eb'"
         ondragleave="this.style.borderColor=''"
         ondrop="handleDrop(event)">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFile(this.files[0])">
      <div style="font-size:28px;margin-bottom:8px">📂</div>
      <div style="font-weight:700">Glissez votre fichier ici ou cliquez</div>
      <div style="font-size:11px;margin-top:4px;color:#94a3b8">CSV ou Excel — colonnes : nom/organisation, siren, domaine</div>
    </div>
    <div class="info" id="fileInfo"></div>
    <div class="row-btns">
      <button class="btn btn-primary" id="btnStart" onclick="startEnrichment()" disabled>⚡ Passe 1 — Dirigeants</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopEnrichment()">⏹ Arrêter</button>
      <button class="btn btn-email" id="btnEmail" onclick="startEmailEnrichment()">✉️ Passe 2 — Emails via Fullenrich</button>
      <button class="btn btn-export" id="btnExport" onclick="exportCSV()">⬇️ Export CSV</button>
      <span class="stat" id="statLabel"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div style="font-size:11px;color:#94a3b8;margin-top:6px" id="progressLabel"></div>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="card">
    <h2>✅ Résultats</h2>
    <div style="overflow-x:auto">
    <table>
      <thead><tr><th>Société</th><th>Prénom</th><th>Nom</th><th>Titre</th><th>Email</th><th>Confiance</th><th>Source</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    </div>
  </div>

</div>
<script>
let rows = [], results = [], running = false, stopFlag = false, countdownInterval = null;

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('zone').style.borderColor = '';
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  } else {
    const reader = new FileReader();
    reader.onload = e => parseXLSX(e.target.result);
    reader.readAsArrayBuffer(file);
  }
  document.getElementById('fileInfo').textContent = `✅ Fichier chargé : ${file.name}`;
}

function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const sep = text.split('\n')[0].split(';').length > text.split('\n')[0].split(',').length ? ';' : ',';
  const lines = text.trim().split('\n');
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
  rows = lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(sep);
    const row = {};
    headers.forEach((h, i) => row[h] = (vals[i]||'').trim().replace(/^"|"$/g,''));
    return normalizeRow(row);
  }).filter(r => r.nom);
  onRowsParsed();
}

function parseXLSX(buffer) {
  if (!window.XLSX) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => doParseXLSX(buffer);
    document.head.appendChild(s);
  } else doParseXLSX(buffer);
}

function doParseXLSX(buffer) {
  const wb = window.XLSX.read(buffer, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = window.XLSX.utils.sheet_to_json(ws, {defval:''});
  rows = data.map(r => {
    const low = {};
    Object.keys(r).forEach(k => low[k.toLowerCase().trim()] = String(r[k]).trim());
    return normalizeRow(low);
  }).filter(r => r.nom);
  onRowsParsed();
}

function normalizeRow(r) {
  const get = (...keys) => { for (const k of keys) { if (r[k] && r[k] !== '—') return r[k]; } return ''; };
  return {
    nom:    get('nom','name','organisation','société','societe','company','entreprise'),
    siren:  get('siren','siret'),
    domaine:get('domaine','domain','website','site','url'),
    org_id: get('org id','org_id','id'),
  };
}

function onRowsParsed() {
  document.getElementById('fileInfo').textContent += ` — ${rows.length} société(s) détectée(s)`;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('statLabel').textContent = `${rows.length} sociétés à enrichir`;
}

async function waitWithCountdown(seconds) {
  return new Promise(resolve => {
    let remaining = seconds;
    const el = document.getElementById('countdown');
    el.textContent = `⏳ Pause ${remaining}s…`;
    countdownInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        el.textContent = '';
        resolve();
      } else {
        el.textContent = `⏳ Pause ${remaining}s…`;
      }
    }, 1000);
  });
}

// -------------------------------------------------------
// PASSE 1 : Pappers + Claude
// -------------------------------------------------------
async function startEnrichment() {
  if (running) return;
  running = true; stopFlag = false; results = [];
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'inline-block';
  document.getElementById('btnEmail').style.display = 'none';
  document.getElementById('btnExport').style.display = 'none';
  document.getElementById('tbody').innerHTML = '';

  for (let i = 0; i < rows.length; i++) {
    if (stopFlag) break;
    document.getElementById('progressFill').style.width = Math.round(i/rows.length*100) + '%';
    document.getElementById('progressLabel').textContent = `${i}/${rows.length} enrichis`;
    document.getElementById('statLabel').textContent = `⏳ ${rows[i].nom}…`;

    try {
      const resp = await fetch('/enrich_one', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(rows[i])
      });
      const data = await resp.json();
      if (data.results) { results.push(...data.results); renderResults(); }
    } catch(e) {
      results.push({ societe: rows[i].nom, siren:'', prenom:'', nom_dg:'', titre:'', email:'', confiance:'', source:'' });
      renderResults();
    }

    // Pas de pause artificielle — le temps de traitement Claude (~15-20s) suffit
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${stopFlag?'Arrêté':'Terminé'} — ${results.length} contacts`;
  document.getElementById('statLabel').textContent = stopFlag ? '⏹ Arrêté' : '✅ Passe 1 terminée !';
  document.getElementById('countdown').textContent = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnExport').style.display = 'inline-block';
  // Afficher le bouton Passe 2 si on a des contacts
  if (results.filter(r => r.nom_dg).length > 0) {
    document.getElementById('btnEmail').style.display = 'inline-block';
  }
  running = false;
}

// -------------------------------------------------------
// PASSE 2 : Fullenrich batch
// -------------------------------------------------------
async function startEmailEnrichment() {
  const btn = document.getElementById('btnEmail');
  btn.disabled = true;
  btn.textContent = '⏳ Fullenrich en cours…';
  document.getElementById('statLabel').textContent = '⏳ Enrichissement emails en cours (1-3 min)…';
  document.getElementById('progressFill').style.width = '30%';

  // Préparer la liste des contacts à enrichir
  const toEnrich = results
    .map((r, idx) => ({ ...r, idx }))
    .filter(r => r.nom_dg && (!r.email || r.confiance === 'faible'));

  if (toEnrich.length === 0) {
    btn.textContent = '✅ Tous les emails déjà trouvés';
    return;
  }

  try {
    const resp = await fetch('/enrich_emails', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contacts: toEnrich.map(r => ({
        idx: r.idx,
        prenom: r.prenom,
        nom: r.nom_dg,
        domaine: r.domaine,
        societe: r.societe,
        email: r.email,
        confiance: r.confiance
      }))})
    });
    const data = await resp.json();
    const emails = data.emails || {};

    // Mettre à jour les résultats
    let found = 0;
    for (const [idxStr, email] of Object.entries(emails)) {
      const idx = parseInt(idxStr);
      if (idx >= 0 && idx < results.length) {
        results[idx].email = email;
        results[idx].confiance = 'haute';
        results[idx].source = (results[idx].source || '') + '+Fullenrich';
        found++;
      }
    }

    renderResults();
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('statLabel').textContent = `✅ Fullenrich : ${found} emails trouvés !`;
    btn.textContent = `✅ ${found} emails ajoutés`;

  } catch(e) {
    document.getElementById('statLabel').textContent = '❌ Erreur Fullenrich';
    btn.disabled = false;
    btn.textContent = '✉️ Réessayer Fullenrich';
  }
}

function stopEnrichment() {
  stopFlag = true;
  if (countdownInterval) clearInterval(countdownInterval);
  document.getElementById('countdown').textContent = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnExport').style.display = 'inline-block';
}

function renderResults() {
  const withEmail = results.filter(r => r.email).length;
  document.getElementById('statLabel').textContent = `✉️ ${withEmail} emails | 👤 ${results.filter(r=>r.nom_dg).length} dirigeants`;
  document.getElementById('tbody').innerHTML = results.map(r => {
    const conf = r.confiance || '';
    let srcClass = 'src-claude';
    if ((r.source||'').includes('Fullenrich')) srcClass = 'src-fullenrich';
    else if ((r.source||'').includes('Pappers')) srcClass = 'src-pappers';
    return `<tr>
      <td><strong>${r.societe||'—'}</strong>${r.org_id?`<br><span style="font-size:10px;color:#7c3aed">ID ${r.org_id}</span>`:''}</td>
      <td>${r.prenom||'—'}</td>
      <td>${r.nom_dg||'—'}</td>
      <td>${r.titre||'—'}</td>
      <td>${r.email?`<span class="email-ok">${r.email}</span>`:`<span class="no-email">—</span>`}</td>
      <td>${conf?`<span class="badge ${conf}">${conf}</span>`:'—'}</td>
      <td>${r.source?`<span class="badge ${srcClass}">${r.source}</span>`:'—'}</td>
    </tr>`;
  }).join('');
}

function exportCSV() {
  const headers = ['org_id','societe','siren','domaine','prenom','nom_dg','titre','email','confiance','source'];
  const lines = [headers.join(';')];
  results.forEach(r => lines.push(headers.map(h=>`"${(r[h]||'').replace(/"/g,'""')}"`).join(';')));
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'enrichissement_dirigeants.csv';
  a.click();
}
</script>
</body>
</html>
